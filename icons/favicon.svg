<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2d50"/>
      <stop offset="100%" stop-color="#0d1627"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#f0c96a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Scale beam horizontal -->
  <rect x="120" y="170" width="272" height="16" rx="8" fill="url(#gold)"/>
  <!-- Scale post vertical -->
  <rect x="248" y="160" width="16" height="200" rx="8" fill="url(#gold)"/>
  <!-- Scale base -->
  <rect x="180" y="344" width="152" height="16" rx="8" fill="url(#gold)"/>
  <!-- Left pan -->
  <circle cx="156" cy="256" r="44" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <!-- Right pan -->
  <circle cx="356" cy="256" r="44" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <!-- Left chain -->
  <line x1="156" y1="178" x2="156" y2="212" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="356" y1="178" x2="356" y2="212" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
</svg>
