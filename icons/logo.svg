<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0b1320"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.3"/>

  <!-- Balance scale base pole -->
  <rect x="248" y="160" width="16" height="160" rx="8" fill="#c9a84c"/>

  <!-- Balance beam -->
  <rect x="128" y="168" width="256" height="12" rx="6" fill="#c9a84c"/>

  <!-- Left pan chain -->
  <line x1="168" y1="180" x2="168" y2="230" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>

  <!-- Right pan chain -->
  <line x1="344" y1="180" x2="344" y2="230" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>

  <!-- Left pan -->
  <path d="M128 230 Q168 255 208 230" stroke="#c9a84c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Right pan (slightly lower = balanced toward right) -->
  <path d="M304 238 Q344 263 384 238" stroke="#f0c96a" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Base triangle -->
  <polygon points="208,320 304,320 256,340" fill="#c9a84c" opacity="0.7"/>

  <!-- Base line -->
  <rect x="180" y="338" width="152" height="10" rx="5" fill="#c9a84c"/>

  <!-- Document lines underneath (representing legal docs) -->
  <rect x="160" y="370" width="192" height="8" rx="4" fill="#c9a84c" opacity="0.4"/>
  <rect x="180" y="386" width="152" height="6" rx="3" fill="#c9a84c" opacity="0.25"/>
  <rect x="196" y="399" width="120" height="5" rx="2.5" fill="#c9a84c" opacity="0.15"/>

  <!-- Top gold dot accent -->
  <circle cx="256" cy="155" r="10" fill="#f0c96a"/>
  <circle cx="256" cy="155" r="5" fill="#0b1320"/>

  <!-- Left balance circle weight -->
  <circle cx="168" cy="185" r="6" fill="#c9a84c" opacity="0.6"/>

  <!-- Right balance circle weight -->
  <circle cx="344" cy="185" r="6" fill="#f0c96a"/>
</svg>
